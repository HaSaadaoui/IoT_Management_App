<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Manage Gateways</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}"/>
    <link rel="stylesheet" type="text/css" th:href="@{/css/header.css}"/>
    <link rel="stylesheet" type="text/css" th:href="@{/css/manageGateways.css}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="/javascript/i18n.js"></script>
</head>

<body>
<div th:replace="fragments/header :: appHeader(pageTitle='Manage Gateways', homeUrl=@{/})"></div>

<th:block th:with="canEdit=${#authorization.expression('hasAnyRole(''ADMIN'',''SUPERUSER'')')}">

    <div class="manageGateways-container">
        <img src="/image/mantu-logo.jpg" alt="Logo" class="mantu-logo">

        <!-- Filtres -->
        <div class="filters-container"
             style="width: 95%; margin: 20px auto 0 auto; padding: 12px 15px; background-color: white; border: 2px solid #662179; border-radius: 8px; display: flex; gap: 15px; align-items: center; box-sizing: border-box; overflow-x: auto">

            <!-- Date filter -->
            <div style="position: relative; display: flex; align-items: center; width: 180px;">
                <img src="/image/calendar-icon.svg" alt="Calendar Icon"
                     style="position: absolute; left: 10px; width: 18px; height: 18px; pointer-events: none;"/>
                <input type="text" name="dateFilter" id="dateFilter"
                       title="Select a date to filter gateways created from this date"
                       placeholder="Filter by date"
                       class="datepicker"
                       style="padding: 8px 30px 8px 36px; border: 1px solid #662179; border-radius: 6px; font-size: inherit; outline: none; box-shadow: none; width: 100%;"/>
                <span onclick="document.getElementById('dateFilter').value='';"
                      style="position: absolute; right: 8px; cursor: pointer; font-size: 16px; color: #000;">&#10005;</span>
            </div>

            <!-- Building filter -->
            <div style="position: relative; display: flex; align-items: center; width: 200px;">
                <select id="buildingFilter"
                        title="Select a building to filter gateways by building name"
                        aria-label="Filter by building"
                        style="padding: 8px 30px 8px 12px; border: 1px solid #662179; border-radius: 6px; font-size: inherit; outline: none; box-shadow: none; width: 100%;">
                    <option value="" disabled selected hidden data-i18n="manage_gateways.filter_building_label">Building (all)</option>
                </select>
                <span id="clearBuilding"
                      style="position: absolute; right: 25px; cursor: pointer; font-size: 16px; color: #000; user-select: none;">&#10005;</span>
            </div>

            <!-- Search input -->
            <div style="position: relative; display: flex; align-items: center; width: 220px;">
                <input type="text" id="searchInput"
                       title="Enter a Gateway ID or IP address to filter the results"
                       placeholder="Search by ID or IP" data-i18n-placeholder="manage_gateways.filter_search_placeholder"
                       style="padding: 8px 30px 8px 36px; border: 1px solid #662179; font-size: inherit; border-radius: 6px; background: url('/image/search-icon.svg') no-repeat 10px center; background-size: 18px 18px; outline: none; transition: border-color 0.3s ease; width: 100%; box-sizing: border-box;"
                       onfocus="this.style.borderColor='#440d64'"
                       onblur="this.style.borderColor='#662179'"/>
                <span onclick="document.getElementById('searchInput').value='';"
                      style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 16px; color: #000; user-select: none;">&#10005;</span>
            </div>
        </div>

        <!-- Table -->
        <table id="gatewayTable">
            <thead>
            <tr>
                <th data-i18n="manage_gateways.table_header_gateway_id">Gateway ID</th>
                <th data-i18n="manage_gateways.table_header_ip_address">IP Address</th>
                <th data-i18n="manage_gateways.table_header_protocol">Protocol</th>
                <th data-i18n="manage_gateways.table_header_frequency_plan">Frequency Plan</th>
                <th data-i18n="manage_gateways.table_header_created_at">Created At</th>
                <th data-i18n="manage_gateways.table_header_building">Building</th>
                <th data-i18n="manage_gateways.table_header_actions">Actions</th>
            </tr>
            </thead>
            <tbody id="gatewayTableBody"></tbody>
        </table>

        <!-- Pagination -->
        <div id="pagination" class="pagination"></div>

        <!-- ===== MODAL DELETE ===== -->
        <div id="deleteGatewayPopup"
             class="modal"
             style="display:none;"
             th:classappend="${!canEdit} ? ' disabled' : ''"
             th:attr="aria-disabled=${!canEdit}">
            <div class="modal-content-delete">
                <h2 data-i18n="modal.delete.title">Confirm delete?</h2>
                <div th:if="${errorDelete}" class="error-message-delete alert-danger">
                    <p th:text="${errorDelete}"></p>
                </div>
                <form th:action="@{/manage-gateways/delete/__id__}" method="post" id="deleteForm">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="form-buttons-delete">
                        <button type="submit" data-i18n="manage_gateways.button_delete">Delete</button>
                        <button type="button" id="closeDelete" data-i18n="manage_gateways.button_cancel">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- ===== MODAL EDIT (uniquement si gatewayEdit != null) ===== -->
        <div id="editGatewayPopup"
             class="modal"
             th:if="${gatewayEdit != null}"
             th:classappend="${!canEdit} ? ' disabled' : ''"
             th:attr="aria-disabled=${!canEdit}">
            <div class="modal-content">
                <h2 data-i18n="manage_gateways.modal_title_edit">Edit Gateway</h2>
                <div th:if="${errorEdit}" class="error-message-edit alert-danger">
                    <p th:text="${errorEdit}"></p>
                </div>
                <form th:action="@{/manage-gateways/edit}" th:object="${gatewayEdit}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <input type="text" th:field="*{gatewayId}" placeholder="Gateway ID" data-i18n-placeholder="manage_gateways.form_label_gateway_id" required readonly
                           th:classappend="${#fields.hasErrors('gatewayId')} ? 'input-error' : ''"/>

                    <input type="text" th:field="*{ipAddress}" placeholder="IP Address" data-i18n-placeholder="manage_gateways.form_label_ip_address" required
                           th:classappend="${#fields.hasErrors('ipAddress')} ? 'input-error' : ''"/>


                    <select id="protocolSelectEdit" name="protocolId" required>
                        <option value="" disabled selected data-i18n="manage_gateways.form_label_protocol">Select Protocol</option>
                        <th:block th:each="p : ${protocolsAvailable}">
                            <option th:value="${p.id}" th:text="${p.name}"
                                    th:selected="${p.id == gatewayEdit.protocolId}"></option>
                        </th:block>
                    </select>

                    <div id="frequencyPlanRowEdit" class="form-row">
                        <select th:field="*{frequencyPlan}" required
                                th:classappend="${#fields.hasErrors('frequencyPlan')} ? 'input-error' : ''">
                            <option value="" disabled selected data-i18n="manage_gateways.form_label_frequency_plan">Frequency Plan</option>
                            <th:block th:each="plan : ${frequencyPlans}">
                                <option th:value="${plan.description}" th:text="${plan}"></option>
                            </th:block>
                        </select>
                    </div>
                    <select th:field="*{buildingId}" id="buildingSelectEdit" required
                            th:classappend="${#fields.hasErrors('buildingId')} ? 'input-error' : ''">
                        <option value="" disabled selected data-i18n="manage_gateways.form_label_building">Select Building</option>
                        <th:block th:each="b : ${buildings}">
                            <option th:value="${b.id}" th:text="${b.name}"></option>
                        </th:block>
                    </select>

                    <!-- ✅ Floor select Edit : data-current et data-building depuis gatewayEdit -->
                    <select id="floorSelectEdit" name="floorNumber" required
                            th:classappend="${#fields.hasErrors('floorNumber')} ? 'input-error' : ''"
                            th:attr="data-current=${gatewayEdit.floorNumber}, data-building=${gatewayEdit.buildingId}">
                        <option value="" disabled selected data-i18n="manage_gateways.form_label_floor">Select a Floor</option>
                    </select>

                    <select id="locationSelectEdit" name="locationId"
                            th:attr="data-current=${gatewayEdit.locationId}">
                        <option value="" disabled selected data-i18n="manage_gateways.form_label_location">Select a location</option>
                    </select>

                    <div class="form-buttons">
                        <button type="submit" data-i18n="manage_gateways.button_update">Update</button>
                        <button type="button" id="closeEdit" data-i18n="manage_gateways.button_cancel">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Bouton Add Gateway -->
        <button id="openCreateBtn"
                th:classappend="${!canEdit} ? ' disabled' : ''"
                th:attr="aria-disabled=${!canEdit}"
                data-i18n="manage_gateways.button_add_gateway">
            Add Gateway
        </button>

        <!-- ===== MODAL CREATE ===== -->
        <div id="createGatewayPopup"
             class="modal modalCreate"
             style="display:none;"
             th:classappend="${!canEdit} ? ' disabled' : ''"
             th:attr="aria-disabled=${!canEdit}">
            <div class="modal-content">
                <h2 data-i18n="manage_gateways.modal_title_add">Add Gateway</h2>
                <div th:if="${errorAdd}" class="error-message-create alert-danger">
                    <p th:text="${errorAdd}"></p>
                </div>
                <form id="myForm" th:action="@{/manage-gateways/add}" th:object="${gatewayAdd}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <input type="text" th:field="*{gatewayId}" placeholder="Gateway ID" data-i18n-placeholder="manage_gateways.form_label_gateway_id" required
                           th:classappend="${#fields.hasErrors('gatewayId')} ? 'input-error' : ''"/>

                    <input type="text" th:field="*{gatewayEui}" placeholder="Gateway EUI" data-i18n-placeholder="manage_gateways.form_label_gateway_eui" required
                           th:classappend="${#fields.hasErrors('gatewayEui')} ? 'input-error' : ''"/>

                    <input type="text" th:field="*{ipAddress}" placeholder="IP Address" data-i18n-placeholder="manage_gateways.form_label_ip_address" required
                           th:classappend="${#fields.hasErrors('ipAddress')} ? 'input-error' : ''"/>

                    <select id="protocolSelectCreate" name="protocolId" required>
                        <option value="" disabled selected data-i18n="manage_gateways.form_label_protocol">Select Protocol</option>
                        <th:block th:each="p : ${protocolsAvailable}">
                            <option th:value="${p.id}" th:text="${p.name}"></option>
                        </th:block>
                    </select>

                    <div id="frequencyPlanRowCreate" class="form-row">
                        <select th:field="*{frequencyPlan}" required
                                th:classappend="${#fields.hasErrors('frequencyPlan')} ? 'input-error' : ''">
                            <option value="" disabled selected data-i18n="manage_gateways.form_label_frequency_plan">Frequency Plan</option>
                            <th:block th:each="plan : ${frequencyPlans}">
                                <option th:value="${plan.description}" th:text="${plan}"></option>
                            </th:block>
                        </select>
                    </div>

                    <select th:field="*{buildingId}" id="buildingSelectCreate" required
                            th:classappend="${#fields.hasErrors('buildingId')} ? 'input-error' : ''">
                        <option value="" disabled selected data-i18n="manage_gateways.form_label_building">Select Building</option>
                        <th:block th:each="b : ${buildings}">
                            <option th:value="${b.id}" th:text="${b.name}"></option>
                        </th:block>
                    </select>

                    <!-- ✅ Floor select Create : pas de th:attr gatewayEdit, désactivé par défaut -->
                    <select id="floorSelectCreate" name="floorNumber" required
                            th:classappend="${#fields.hasErrors('floorNumber')} ? 'input-error' : ''"
                            disabled>
                        <option value="" disabled selected data-i18n="manage_gateways.form_label_floor">Select a Floor</option>
                    </select>

                    <select id="locationSelectCreate" name="locationId" disabled>
                        <option value="" disabled selected data-i18n="manage_gateways.form_label_location">Select a location</option>
                    </select>

                    <div class="form-buttons">
                        <button type="submit" data-i18n="manage_gateways.button_add">Add</button>
                        <button type="button" id="closeCreate" data-i18n="manage_gateways.button_cancel">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

    </div><!-- fin manageGateways-container -->

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <script th:inline="javascript">
        /*<![CDATA[*/
        window.GATEWAYS          = /*[[${gateways}]]*/        [];
        window.AVAILABLE_PROTOCOLS = /*[[${protocolsAvailable}]]*/ [];
        window.BUILDING_FLOORS   = /*[[${buildingFloors}]]*/  [];
        window.LOCATIONS         = /*[[${locations}]]*/       [];
        window.CAN_EDIT_GATEWAYS = /*[[${#authorization.expression("hasAnyRole('ADMIN','SUPERUSER')")}]]*/ false;
        /*]]>*/
    </script>

    <script th:src="@{/javascript/manageGateways.js}" defer></script>
    <script>document.addEventListener('DOMContentLoaded', function() { i18n.init(); });</script>

</th:block>
</body>
</html>
