<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}"/>
    <link rel="stylesheet" type="text/css" th:href="@{/css/header.css}"/>
    <link rel="stylesheet" type="text/css" th:href="@{/css/profile.css}"/>
    <script src="/javascript/i18n.js"></script>
</head>
<body class="profile-page">
    <header class="app-header">
        <a href="javascript:void(0)" onclick="history.back()" class="back-btn" title="Go back" style="margin-right: 20px">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30" width="30" height="30">
                <circle cx="15" cy="15" r="13" fill="none" stroke="#662179" stroke-width="2"/>
                <path d="M17 9 L11 15 L17 21" fill="none" stroke="#662179" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <line x1="11" y1="15" x2="22" y2="15" stroke="#662179" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </a>
        <div class="header-title-gateway">
            <span>My Profile</span>
        </div>
        <div class="header-right">
            <div class="dropdown">
                <button onclick="toggleMenu()" class="menu-btn" aria-label="Menu">
                    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="#662179" viewBox="0 0 24 24">
                        <path d="M3 6h18M3 12h18M3 18h18" stroke="#662179" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
                <div id="dropdownMenu" class="dropdown-content">
                    <a th:href="@{/home}">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22">
                            <path fill="#662179" d="M12 3.172 2.293 12.88a1 1 0 1 0 1.414 1.414L5 13.001V20a2 2 0 0 0 2 2h3a1 1 0 0 0 1-1v-5h2v5a1 1 0 0 0 1 1h3a2 2 0 0 0 2-2v-6.999l1.293 1.293a1 1 0 0 0 1.414-1.414L12 3.172z"/>
                        </svg>
                        Home
                    </a>
                    <a th:href="@{/users/{username}(username=${loggedUsername})}">
                        <svg xmlns="http://www.w3.org/2000/svg" height="22" viewBox="0 -960 960 960" width="22">
                            <path fill="#662179" d="M400-480q-66 0-113-47t-47-113q0-66 47-113t113-47q66 0 113 47t47 113q0 66-47 113t-113 47ZM80-160v-112q0-33 17-62t47-44q51-26 115-44t141-18h14q6 0 12 2-8 18-13.5 37.5T404-360h-4q-71 0-127.5 18T180-306q-9 5-14.5 14t-5.5 20v32h252q6 21 16 41.5t22 38.5H80Zm560 40-12-60q-12-5-22.5-10.5T584-204l-58 18-40-68 46-40q-2-14-2-26t2-26l-46-40 40-68 58 18q11-8 21.5-13.5T628-460l12-60h80l12 60q12 5 22.5 11t21.5 15l58-20 40 70-46 40q2 12 2 25t-2 25l46 40-40 68-58-18q-11 8-21.5 13.5T732-180l-12 60h-80Zm40-120q33 0 56.5-23.5T760-320q0-33-23.5-56.5T680-400q-33 0-56.5 23.5T600-320q0 33 23.5 56.5T680-240ZM400-560q33 0 56.5-23.5T480-640q0-33-23.5-56.5T400-720q-33 0-56.5 23.5T320-640q0 33 23.5 56.5T400-560Zm0-80Zm12 400Z"/>
                        </svg>
                        Account
                    </a>
                    <form th:action="@{/logout}" method="post" class="logout-form" style="margin: 0">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="logout-link">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="22" height="22" fill="#662179">
                                <path d="M 2.174 2.314 C 0.018 4.610, 0 4.949, 0 44.140 L 0 83.651 2.250 85.699 C 4.901 88.111, 28.126 96, 32.577 96 C 36.811 96, 40 92.427, 40 87.686 L 40 84 48.050 84 C 62.336 84, 64.223 81.596, 63.785 63.959 L 63.500 52.500 61 52.500 C 58.510 52.500, 58.498 52.544, 58 63.834 C 57.397 77.497, 57 78, 46.809 78 L 40 78 40 45.174 C 40 12.406, 39.996 12.345, 37.750 10.302 C 36.513 9.176, 34.150 7.783, 32.500 7.206 C 30.082 6.361, 31.839 6.143, 41.559 6.079 C 57.716 5.973, 57.360 5.669, 58 20.166 C 58.498 31.456, 58.510 31.500, 61 31.500 L 63.500 31.500 63.785 20.041 C 63.962 12.888, 63.628 7.515, 62.894 5.744 C 60.667 0.367, 58.579 -0, 30.224 0 C 4.470 0, 4.338 0.011, 2.174 2.314 M 7.095 7.305 C 5.842 8.558, 5.527 78.748, 6.765 80.596 C 7.169 81.199, 12.970 83.514, 19.655 85.741 C 28.459 88.673, 32.113 89.487, 32.905 88.695 C 34.158 87.442, 34.473 17.252, 33.235 15.404 C 32.831 14.801, 27.030 12.486, 20.345 10.259 C 11.541 7.327, 7.887 6.513, 7.095 7.305 M 75.667 24.667 C 74.049 26.284, 75.348 28.918, 80.041 33.538 L 85.083 38.500 68.791 39 L 52.500 39.500 52.500 42 L 52.500 44.500 68.940 44.776 L 85.381 45.051 80.094 50.405 C 74.652 55.915, 73.730 59.132, 77.392 59.837 C 79.568 60.256, 96 44.506, 96 42 C 96 39.981, 79.926 24, 77.896 24 C 77.036 24, 76.033 24.300, 75.667 24.667"/>
                            </svg>
                            Logout
                        </button>
                    </form>
                </div>
            </div>
            <div class="header-user">
                <a th:href="@{/users/{username}(username=${loggedUsername})}" class="header-link">
                    <img th:src="${user.icon}" class="header-avatar" alt="User Avatar" width="32" height="32"/>
                </a>
            </div>
        </div>
    </header>

<div class="profile-container">
    <div class="profile-box">

        <!-- Bloc avatar à gauche -->
        <div class="profile-left">
            <div class="avatar-wrapper">
                <img th:src="${user.icon}"
                     alt="User Avatar" class="user-avatar">
                
                <!-- Edit icon overlay on avatar -->
                <div class="avatar-edit-overlay" th:if="${user.username == loggedUsername}"
                     onclick="openAvatarModal()" title="Change profile picture" data-i18n="profile.change_profile_picture">
                    <svg xmlns="http://www.w3.org/2000/svg" height="28px" viewBox="0 -960 960 960" width="28px">
                        <path fill="#ffffff"
                              d="M200-200h57l391-391-57-57-391 391v57Zm-80 80v-170l528-527q12-11 26.5-17t30.5-6q16 0 31 6t26 18l55 56q12 11 17.5 26t5.5 30q0 16-5.5 30.5T817-647L290-120H120Zm640-584-56-56 56 56Zm-141 85-28-29 57 57-29-28Z"/>
                    </svg>
                </div>
            </div>
            
            <!-- Email below avatar -->
            <div class="profile-email">
                <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 -960 960 960" width="18px" fill="#662179">
                    <path d="M160-160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800h640q33 0 56.5 23.5T880-720v480q0 33-23.5 56.5T800-160H160Zm320-280L160-640v400h640v-400L480-440Zm0-80 320-200H160l320 200ZM160-640v-80 480-400Z"/>
                </svg>
                <span th:text="${user.email}"></span>
            </div>
        </div>

        <!-- Infos utilisateur à droite -->
        <div class="profile-right">
            <h2>My Profile</h2>

            <!-- Personal Information Section -->
            <div class="info-section">
                <h3 class="section-title" data-i18n="profile.personal_info_section">Personal Information</h3>
                <div class="info-grid">
                    <div class="info-item">
                        <label data-i18n="profile.first_name_label">First Name</label>
                        <p th:text="${user.firstname}"></p>
                    </div>
                    <div class="info-item">
                        <label data-i18n="profile.last_name_label">Last Name</label>
                        <p th:text="${user.lastname}"></p>
                    </div>
                </div>
            </div>

            <!-- Account Information Section -->
            <div class="info-section">
                <h3 class="section-title" data-i18n="profile.account_info_section">Account Information</h3>
                <div class="info-grid">
                    <div class="info-item">
                        <label data-i18n="profile.username_label">Username</label>
                        <p th:text="${user.username}"></p>
                    </div>
                    <div class="info-item">
                        <label data-i18n="profile.role_label">Role</label>
                        <p class="role-badge" th:text="${user.role}"></p>
                    </div>
                </div>
            </div>

            <!-- Boutons actions -->
            <div class="profile-actions" th:if="${user.username == loggedUsername}">
                <button onclick="openModal()" class="btn-action btn-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="currentColor">
                        <path d="M240-80q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640h40v-80q0-83 58.5-141.5T480-920q83 0 141.5 58.5T680-720v80h40q33 0 56.5 23.5T800-560v400q0 33-23.5 56.5T720-80H240Zm0-80h480v-400H240v400Zm240-120q33 0 56.5-23.5T560-360q0-33-23.5-56.5T480-440q-33 0-56.5 23.5T400-360q0 33 23.5 56.5T480-280ZM360-640h240v-80q0-50-35-85t-85-35q-50 0-85 35t-35 85v80ZM240-160v-400 400Z"/>
                    </svg>
                    <span data-i18n="profile.change_password_btn">Change Password</span>
                </button>
                <button onclick="openEditModal()" class="btn-action btn-secondary">
                    <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="currentColor">
                        <path d="M200-200h57l391-391-57-57-391 391v57Zm-80 80v-170l528-527q12-11 26.5-17t30.5-6q16 0 31 6t26 18l55 56q12 11 17.5 26t5.5 30q0 16-5.5 30.5T817-647L290-120H120Zm640-584-56-56 56 56Zm-141 85-28-29 57 57-29-28Z"/>
                    </svg>
                    <span data-i18n="profile.update_details_btn">Update Details</span>
                </button>
            </div>

            <!-- Message succès -->
            <p class="success-message" th:if="${success}" th:text="${success}"></p>
        </div>
    </div>
</div>
<!-- Modal pour changement de mot de passe -->
<div id="passwordModal"
     class="modal"
     th:classappend="(${errorCurrent != null} or ${errorNew != null} or ${errorConfirm != null} or ${globalError != null}) ? ' show' : ''">
    <div class="modal-content">
        <h3 data-i18n="profile.change_password_modal_title">Change password</h3>
        <form id="passwordForm"
              th:action="@{/users/{username}/change-password(username=${user.username})}"
              method="post">
            <label data-i18n="profile.current_password_label">Current password</label>
            <input type="password" name="currentPassword" required>
            <p class="error-message" th:if="${errorCurrent}" th:text="${errorCurrent}"></p>

            <label data-i18n="profile.new_password_label">New password</label>
            <input type="password" name="newPassword" required minlength="8">
            <p class="error-message" th:if="${errorNew}" th:text="${errorNew}"></p>

            <label data-i18n="profile.confirm_password_label">Confirm new password</label>
            <input type="password" name="confirmPassword" required>
            <p class="error-message" th:if="${errorConfirm}" th:text="${errorConfirm}"></p>

            <p class="error-message" th:if="${globalError}" th:text="${globalError}"></p>

            <div style="margin-top: 10px;">
                <button type="submit" data-i18n="profile.update_btn">Update</button>
                <button type="button" onclick="closeModal()" data-i18n="profile.cancel_btn">Cancel</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal pour édition des informations -->
<div id="editUserModal"
     class="modal"
     th:classappend="(${errorEdit != null}) ? ' show' : ''">
    <div class="modal-content">
        <h3 data-i18n="profile.edit_details_modal_title">Update my details</h3>
        <form id="editUserForm"
              th:action="@{/users/{username}/edit(username=${user.username})}"
              method="post">

            <label data-i18n="profile.firstname_label">Firstname</label>
            <input type="text" name="firstname" th:value="${user.firstname}" required>

            <label data-i18n="profile.lastname_label">Lastname</label>
            <input type="text" name="lastname" th:value="${user.lastname}" required>

            <label data-i18n="profile.email_label">Email</label>
            <input type="email" name="email" th:value="${user.email}" required>

            <p class="error-message" th:if="${errorEdit}" th:text="${errorEdit}"></p>
            <p class="success-message" th:if="${successEdit}" th:text="${successEdit}"></p>

            <div style="margin-top: 10px;">
                <button type="submit" data-i18n="profile.update_btn">Update</button>
                <button type="button" onclick="closeEditModal()" data-i18n="profile.cancel_btn">Cancel</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal pour édition de l'avatar -->
<div id="avatarModal" class="modal">
    <div class="modal-content">
        <h3 data-i18n="profile.change_icon_modal_title">Change Icon</h3>
        <form th:action="@{/users/{username}/update-avatar(username=${user.username})}"
              method="post" enctype="multipart/form-data">
            <input type="file" name="avatar" accept="image/*" required>
            <div style="margin-top: 10px;">
                <button type="submit" data-i18n="profile.upload_btn">Upload</button>
                <button type="button" onclick="closeAvatarModal()" data-i18n="profile.cancel_btn">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script>document.addEventListener('DOMContentLoaded', function() { i18n.init(); });</script>
<script>
    function toggleMenu() {
        document.getElementById("dropdownMenu").classList.toggle("show");
    }

    const passwordModal = document.getElementById("passwordModal");
    const editUserModal = document.getElementById("editUserModal");
    const avatarModal = document.getElementById('avatarModal');

    function openModal() {
        passwordModal.style.display = "flex";
    }

    function closeModal() {
        passwordModal.style.display = "none";
    }

    function openAvatarModal() {
        avatarModal.style.display = 'flex';
    }

    function closeAvatarModal() {
        avatarModal.style.display = 'none';
    }

    function openEditModal() {
        editUserModal.style.display = "flex";
    }

    function closeEditModal() {
        editUserModal.style.display = "none";
    }

    window.onclick = function (event) {
        if (!event.target.closest('.dropdown')) {
            const menu = document.getElementById("dropdownMenu");
            if (menu) menu.classList.remove("show");
        }
        if (event.target === passwordModal) {
            closeModal();
        }
        if (event.target === editUserModal) {
            closeEditModal();
        }
        if (event.target === avatarModal) {
            closeAvatarModal();
        }
    }
</script>
</body>
</html>
